<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — DejaVu.ai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}?v={{ range(1000,9999)|random }}">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">
        <span id="t-icon">🌙</span>
        <span id="t-label">Dark</span>
    </button>

    <div class="auth-wrapper">
        <div class="auth-header">
            <div class="brand-icon"><img src="/assets/logo.png" alt="DejaVu" style="width:56px;height:56px;border-radius:50%;object-fit:cover;"></div>
            <p>Your intelligent, memory-powered companion.</p>
        </div>

        <div class="auth-box">
            <div class="toggle-btns">
                <button class="active" id="login-tab">Sign In</button>
                <button id="signup-tab">Sign Up</button>
            </div>
            <form id="auth-form" onsubmit="event.preventDefault(); submitAuth();">
                <div class="input-group" id="username-group" style="display:none;">
                    <label>Username</label>
                    <input type="text" id="username-input" placeholder="Your name" />
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email-input" placeholder="you@example.com" required />
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div style="position:relative;display:flex;align-items:center;">
                        <input type="password" id="password-input" placeholder="••••••••" required style="width:100%; padding-right:30px;" />
                        <span onclick="togglePassword('password-input', this)" style="position:absolute; right:10px; cursor:pointer; font-size: 1.1rem; filter: grayscale(100%);">👁️</span>
                    </div>
                </div>
                <div class="input-group" id="confirm-password-group" style="display:none;">
                    <label>Confirm Password</label>
                    <div style="position:relative;display:flex;align-items:center;">
                        <input type="password" id="confirm-password-input" placeholder="••••••••" style="width:100%; padding-right:30px;" />
                        <span onclick="togglePassword('confirm-password-input', this)" style="position:absolute; right:10px; cursor:pointer; font-size: 1.1rem; filter: grayscale(100%);">👁️</span>
                    </div>
                </div>
                <div id="auth-error" style="color:#ef4444;font-size:.82rem;margin-top:-8px;margin-bottom:6px;display:none;"></div>
                <button type="submit" class="submit-btn" id="submit-btn">Continue →</button>
                <button type="button" class="submit-btn" id="guest-btn" onclick="continueAsGuest()" style="margin-top:10px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);box-shadow:none;">Continue as Guest 👤</button>
            </form>
        </div>
    </div>

    <script>
        let isSignup = false;
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('deja-theme', isDark ? 'dark' : 'light');
            document.getElementById('t-icon').textContent = isDark ? '☀️' : '🌙';
            document.getElementById('t-label').textContent = isDark ? 'Light' : 'Dark';
        }
        if (localStorage.getItem('deja-theme') === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('t-icon').textContent = '☀️';
            document.getElementById('t-label').textContent = 'Light';
        }

        document.getElementById('login-tab').addEventListener('click', function() {
            isSignup = false;
            this.classList.add('active');
            document.getElementById('signup-tab').classList.remove('active');
            document.getElementById('submit-btn').textContent = 'Sign In →';
            document.getElementById('username-group').style.display = 'none';
            document.getElementById('confirm-password-group').style.display = 'none';
        });
        document.getElementById('signup-tab').addEventListener('click', function() {
            isSignup = true;
            this.classList.add('active');
            document.getElementById('login-tab').classList.remove('active');
            document.getElementById('submit-btn').textContent = 'Create Account →';
            document.getElementById('username-group').style.display = 'block';
            document.getElementById('confirm-password-group').style.display = 'block';
        });

        function togglePassword(inputId, iconEl) {
            const el = document.getElementById(inputId);
            if (el.type === 'password') {
                el.type = 'text';
                iconEl.style.filter = 'none'; // Highlight
            } else {
                el.type = 'password';
                iconEl.style.filter = 'grayscale(100%)';
            }
        }

        async function submitAuth() {
            const email    = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            const confirm_password = document.getElementById('confirm-password-input').value;
            const username = document.getElementById('username-input').value.trim();
            const errEl    = document.getElementById('auth-error');
            errEl.style.display = 'none';
            
            if (isSignup && password !== confirm_password) {
                errEl.style.color = '#ef4444';
                errEl.textContent = 'Passwords do not match.';
                errEl.style.display = 'block';
                return;
            }

            const endpoint = isSignup ? '/auth/register' : '/auth/login';
            const body     = isSignup ? {email, password, username} : {email, password};
            try {
                const r = await fetch(endpoint, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
                const d = await r.json();
                if(d.ok) {
                    if (isSignup && d.msg) {
                        errEl.style.color = '#10b981'; // Green color for success
                        errEl.textContent = d.msg;
                        errEl.style.display = 'block';
                    } else {
                        window.location.href = '/chat';
                    }
                }
                else { errEl.style.color = '#ef4444'; errEl.textContent = d.error || 'Something went wrong.'; errEl.style.display = 'block'; }
            } catch(e) { errEl.style.color = '#ef4444'; errEl.textContent = 'Network error.'; errEl.style.display = 'block'; }
        }

        async function continueAsGuest() {
            const r = await fetch('/auth/guest', {method:'POST'});
            const d = await r.json();
            if(d.ok) window.location.href = '/chat';
        }
    </script>
</body>
</html>
